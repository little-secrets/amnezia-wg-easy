services:
  amnezia-wg-easy:
    image: ghcr.io/w0rng/amnezia-wg-easy:latest
    container_name: amnezia-wg-easy
    restart: unless-stopped
    
    # Environment variables
    env_file:
      - .env
    
    # Volumes
    volumes:
      - amnezia-wg-easy:/etc/wireguard
    
    # Ports
    ports:
      - "${WG_PORT:-51820}:${WG_PORT:-51820}/udp"
      - "${PORT:-51821}:${PORT:-51821}/tcp"
    
    # Capabilities required for WireGuard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
      # - NET_RAW  # Uncomment if using Podman
    
    # Sysctl settings for WireGuard
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    
    # Device mapping for TUN
    devices:
      - /dev/net/tun:/dev/net/tun
  

volumes:
  amnezia-wg-easy: