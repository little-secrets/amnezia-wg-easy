            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/wireguard/client/{clientId}/configuration:
    get:
      tags:
        - Configuration
      summary: Download client configuration
      description: Downloads the WireGuard configuration file for the client
      security:
        - cookieAuth: []
        - headerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Client UUID
      responses:
        '200':
          description: Configuration file
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="client1.conf"'
          content:
            text/plain:
              schema:
                type: string
                example: |
                  [Interface]
                  PrivateKey = ABC123...
                  Address = 10.8.0.2/24
                  DNS = 1.1.1.1
                  
                  [Peer]
                  PublicKey = SERVER_PUBLIC_KEY
                  Endpoint = vpn.example.com:51820
                  AllowedIPs = 0.0.0.0/0, ::/0
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid client ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Client not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/wireguard/client/{clientId}/secrets:
    get:
      tags:
        - Configuration
      summary: Get client secrets (keys)
      description: |
        Returns sensitive client data: private key, public key, and pre-shared key.
        
        **Security Warning:** This endpoint returns sensitive cryptographic keys.
        Use with caution and ensure proper authentication.
        
        **Note:** If client was created with only publicKey (without privateKey),
        the privateKey field will be empty.
      security:
        - cookieAuth: []
        - headerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Client UUID
      responses:
        '200':
          description: Client secrets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientSecretsResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid client ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Client not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/wireguard/client/{clientId}/generateOneTimeLink:
    post:
      tags:
        - One-Time Links
      summary: Generate one-time download link
      description: |
        Generates a temporary download link for the client configuration.
        Link expires in 5 minutes or after first use.
        Requires WG_ENABLE_ONE_TIME_LINKS=true
      security:
        - cookieAuth: []
        - headerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Client UUID
      responses:
        '200':
          description: Link generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid client ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Feature disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cnf/{oneTimeLink}:
    get:
      tags:
        - One-Time Links
      summary: Download config via one-time link
      description: |
        Public endpoint to download configuration using a one-time link.
        Link expires after use or after 5 minutes.
        No authentication required.
      parameters:
        - name: oneTimeLink
          in: path
          required: true
          schema:
            type: string
          description: One-time link token
          example: "a1b2c3d4"
      responses:
        '200':
          description: Configuration file
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="a1b2c3d4.conf"'
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Invalid or expired link
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/wireguard/backup:
    get:
      tags:
        - Backup
      summary: Download configuration backup
      description: Downloads a complete backup of all WireGuard configuration
      security:
        - cookieAuth: []
        - headerAuth: []
      responses:
        '200':
          description: Backup file
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="wg0.json"'
          content:
            application/json:
              schema:
                type: object
                properties:
                  server:
                    type: object
                    description: Server configuration
                  clients:
                    type: object
                    description: Map of client configurations
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/wireguard/restore:
    put:
      tags:
        - Backup
      summary: Restore configuration from backup
      description: Restores WireGuard configuration from a backup file
      security:
        - cookieAuth: []
        - headerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestoreRequest'
      responses:
        '200':
          description: Configuration restored successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Restore failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /metrics:
    get:
      tags:
        - Metrics
      summary: Get Prometheus metrics
      description: |
        Returns metrics in Prometheus format.
        Requires ENABLE_PROMETHEUS_METRICS=true.
        Optional Basic Auth with PROMETHEUS_METRICS_PASSWORD.
      security:
        - {}
        - headerAuth: []
      responses:
        '200':
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string
                example: |
                  # HELP wireguard_configured_peers
                  # TYPE wireguard_configured_peers gauge
                  wireguard_configured_peers{interface="wg0"} 3

  /metrics/json:
    get:
      tags:
        - Metrics
      summary: Get metrics in JSON format
      description: |
        Returns basic metrics in JSON format.
        Requires ENABLE_PROMETHEUS_METRICS=true.
        Optional Basic Auth with PROMETHEUS_METRICS_PASSWORD.
      security:
        - {}
        - headerAuth: []
      responses:
        '200':
          description: Metrics in JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsJSON'

