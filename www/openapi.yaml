  /api/wireguard/client/{clientId}/allowedIPs:
    put:
      tags:
        - Clients
      summary: Update client allowed IPs
      description: Changes which traffic is routed through VPN for this client
      security:
        - cookieAuth: []
        - headerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Client UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClientAllowedIPsRequest'
            examples:
              full_tunnel:
                summary: Full tunnel (all traffic)
                value:
                  allowedIPs: "0.0.0.0/0, ::/0"
              split_tunnel:
                summary: Split tunnel (specific networks)
                value:
                  allowedIPs: "10.0.0.0/8, 192.168.0.0/16"
      responses:
        '200':
          description: Allowed IPs updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid client ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/wireguard/client/{clientId}/dns:
